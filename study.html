
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>M&A学習プログラム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="curriculum.js"></script>
<style>
:root{
  --bg:#090912;--s1:#10101c;--s2:#16162a;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --text:#e2e2f0;--muted:#64648a;--muted2:#9494b8;
  --accent:#7c6ff7;--acl:#a89ff8;--green:#4fc88e;--amber:#f4c06a;--coral:#f07a5a;
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;font-size:14px;line-height:1.75;padding-bottom:100px;}

/* HEADER */
.hd{background:linear-gradient(160deg,#12103a 0%,#0d1830 55%,#090912 100%);padding:36px 20px 28px;position:relative;overflow:hidden;}
.hd::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 90% at 95% 10%,rgba(124,111,247,.22) 0%,transparent 65%);pointer-events:none;}
.hd-ey{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.14em;color:var(--muted2);text-transform:uppercase;margin-bottom:8px;}
.hd-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(124,111,247,.14);border:1px solid rgba(124,111,247,.28);color:var(--acl);font-size:10px;font-family:'IBM Plex Mono',monospace;padding:3px 10px;border-radius:20px;margin-bottom:14px;}
.hd-badge::before{content:'●';font-size:6px;color:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.hd-title{font-size:22px;font-weight:700;line-height:1.3;margin-bottom:6px;}
.hd-title span{color:var(--acl);}
.hd-date{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);margin-top:8px;}
.hd-bar-wrap{margin-top:18px;}
.hd-bar-row{display:flex;justify-content:space-between;margin-bottom:6px;}
.hd-bar-label{font-size:11px;color:var(--muted2);}
.hd-bar-val{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--acl);}
.hd-bar{height:4px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;}
.hd-bar-fill{height:4px;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--green));}

/* CONTENT */
.content{padding:0 16px;margin-top:20px;}
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:12px;animation:fadeUp .4s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

/* GOAL */
.goal-card{background:linear-gradient(135deg,rgba(124,111,247,.12) 0%,rgba(79,200,142,.08) 100%);border-color:rgba(124,111,247,.25);}
.goal-label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;color:var(--acl);text-transform:uppercase;margin-bottom:8px;}
.goal-text{font-size:15px;font-weight:500;line-height:1.6;}

/* SEC HEADER */
.sec-hd{display:flex;align-items:center;gap:8px;margin:20px 0 10px;}
.sec-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.si-morning{background:rgba(244,192,106,.12);}
.si-check{background:rgba(244,122,90,.12);}
.si-notion{background:rgba(124,111,247,.12);}
.sec-title{font-size:13px;font-weight:500;color:var(--muted2);}

/* READING BADGE */
.rbadge{display:inline-flex;align-items:center;gap:5px;background:rgba(79,200,142,.1);border:1px solid rgba(79,200,142,.2);color:var(--green);font-size:11px;font-family:'IBM Plex Mono',monospace;padding:3px 10px;border-radius:20px;margin-bottom:16px;}

/* LEARN SECTIONS */
.lsec{margin-bottom:22px;padding-bottom:22px;border-bottom:1px solid var(--border);}
.lsec:last-of-type{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.lsec-title{font-size:12px;font-weight:700;color:var(--amber);font-family:'IBM Plex Mono',monospace;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;}
.ltext{font-size:14px;color:var(--text);line-height:1.85;}
.ltext p{margin-bottom:10px;}
.ltext p:last-child{margin-bottom:0;}

/* POINT BOX */
.pbox{background:rgba(79,200,142,.06);border:1px solid rgba(79,200,142,.15);border-radius:8px;padding:14px;margin:10px 0;}
.pbox-label{font-size:10px;color:var(--green);font-family:'IBM Plex Mono',monospace;letter-spacing:.06em;margin-bottom:8px;}
.pitem{display:flex;gap:8px;margin-bottom:6px;font-size:13px;line-height:1.6;}
.pitem:last-child{margin-bottom:0;}
.pdot{color:var(--green);flex-shrink:0;}

/* ANALOGY */
.analogy{background:rgba(244,192,106,.06);border:1px solid rgba(244,192,106,.15);border-radius:8px;padding:14px;margin:12px 0;}
.analogy-label{font-size:10px;color:var(--amber);font-family:'IBM Plex Mono',monospace;letter-spacing:.06em;margin-bottom:6px;}
.analogy-text{font-size:13px;color:var(--text);line-height:1.7;white-space:pre-line;}

/* SOURCE */
.src-box{background:var(--s2);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;margin-top:14px;}
.src-label{font-size:10px;color:var(--muted);font-family:'IBM Plex Mono',monospace;letter-spacing:.06em;margin-bottom:6px;}
.src-item{font-size:11px;color:var(--muted2);line-height:1.8;}

/* TONIGHT */
.tonight-card{background:rgba(124,111,247,.06);border:1px solid rgba(124,111,247,.15);border-radius:var(--r);padding:16px;margin-bottom:12px;animation-delay:.22s;}
.tonight-label{font-size:10px;color:var(--acl);font-family:'IBM Plex Mono',monospace;letter-spacing:.06em;margin-bottom:8px;}
.tonight-text{font-size:13px;color:var(--muted2);line-height:1.7;}

/* CHECKLIST */
.chk{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:8px;margin-bottom:6px;background:var(--s2);border:1px solid var(--border);cursor:pointer;transition:all .18s;user-select:none;}
.chk:last-child{margin-bottom:0;}
.chk:hover{border-color:var(--border2);}
.chk.done{background:rgba(79,200,142,.07);border-color:rgba(79,200,142,.2);}
.chk-circle{width:18px;height:18px;border-radius:50%;flex-shrink:0;margin-top:2px;border:2px solid var(--muted);transition:all .18s;display:flex;align-items:center;justify-content:center;}
.chk.done .chk-circle{background:var(--green);border-color:var(--green);}
.chk.done .chk-circle::after{content:'✓';font-size:10px;color:#fff;}
.chk-text{font-size:13px;line-height:1.6;}
.chk.done .chk-text{color:var(--muted2);text-decoration:line-through;}

/* NOTION */
.notion-card{display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit;transition:border-color .18s;}
.notion-card:hover{border-color:var(--border2);}
.notion-logo{width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.notion-body{flex:1;}
.notion-label{font-size:10px;color:var(--muted);font-family:'IBM Plex Mono',monospace;letter-spacing:.06em;}
.notion-title{font-size:13px;font-weight:500;color:var(--text);margin-top:2px;}
.notion-arr{color:var(--muted);font-size:18px;}

/* COMPLETE */
.complete-wrap{position:fixed;bottom:0;left:0;right:0;padding:12px 16px 20px;background:linear-gradient(to top,var(--bg) 60%,transparent 100%);}
.complete-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--accent),#5b4fd4);border:none;border-radius:10px;color:#fff;font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s,transform .1s;box-shadow:0 4px 20px rgba(124,111,247,.35);}
.complete-btn:active{transform:scale(.98);opacity:.9;}

/* DONE OVERLAY */
.done-overlay{position:fixed;inset:0;background:rgba(9,9,18,.9);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;z-index:100;padding:20px;}
.done-overlay.show{opacity:1;pointer-events:auto;}
.done-box{background:var(--s2);border:1px solid var(--border2);border-radius:16px;padding:32px 24px;text-align:center;max-width:320px;width:100%;animation:popIn .35s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes popIn{from{transform:scale(.85);opacity:0;}to{transform:scale(1);opacity:1;}}
.done-emoji{font-size:52px;margin-bottom:12px;}
.done-title{font-size:20px;font-weight:700;margin-bottom:8px;}
.done-body{font-size:13px;color:var(--muted2);line-height:1.7;margin-bottom:20px;}
.done-close{background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:500;padding:12px 28px;cursor:pointer;}

/* HOME */
.home-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--s1);border:1px solid var(--border);border-radius:10px;margin-bottom:7px;text-decoration:none;color:inherit;transition:border-color .18s;}
.home-row:hover{border-color:var(--border2);}
.home-day{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);min-width:42px;}
.home-theme{flex:1;font-size:13px;}
.home-phase{font-size:10px;font-family:'IBM Plex Mono',monospace;padding:2px 7px;border-radius:12px;}
.hp1{background:rgba(124,111,247,.12);color:var(--acl);}
.hp2{background:rgba(79,200,142,.1);color:var(--green);}
.hp3{background:rgba(244,192,106,.1);color:var(--amber);}
.week-sep{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;letter-spacing:.06em;padding:8px 4px 4px;margin-top:4px;}
</style>
</head>
<body>

<div id="app"></div>

<div class="done-overlay" id="done-overlay">
  <div class="done-box">
    <div class="done-emoji">☀️</div>
    <div class="done-title">朝のインプット完了！</div>
    <div class="done-body" id="done-msg"></div>
    <button class="done-close" onclick="document.getElementById('done-overlay').classList.remove('show')">閉じる</button>
  </div>
</div>

<script>
// ── ROUTER ──────────────────────────────────────────────
const params = new URLSearchParams(location.search);
const dayParam = parseInt(params.get('d') || '0', 10);

function todayStr(){
  const w=['日','月','火','水','木','金','土'];
  const d=new Date();
  return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日（'+w[d.getDay()]+'）';
}

// ── HOME ─────────────────────────────────────────────────
function renderHome(){
  let lastWeek = 0;
  const rows = C.map(c=>{
    let sep = '';
    if(c.week !== lastWeek){
      lastWeek = c.week;
      const phaseLabel = c.phase==='Phase 1'?'財務・バリュエーション':c.phase==='Phase 2'?'法務・契約・DD':'戦略・PMI';
      sep = `<div class="week-sep">Week ${c.week} — ${phaseLabel}</div>`;
    }
    const phaseClass = c.phase==='Phase 1'?'hp1':c.phase==='Phase 2'?'hp2':'hp3';
    return sep + `<a class="home-row" href="?d=${c.day}">
      <div class="home-day">D${String(c.day).padStart(2,'0')}</div>
      <div class="home-theme">${c.theme}</div>
      <div class="home-phase ${phaseClass}">${c.domain}</div>
    </a>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="hd">
      <div class="hd-ey">M&A アライアンス スキル習得プログラム</div>
      <div class="hd-badge">全40日 · 朝インプット特化</div>
      <div class="hd-title">学習カリキュラム<br><span>Day一覧</span></div>
      <div class="hd-date">${todayStr()}</div>
    </div>
    <div class="content">
      <div style="font-size:12px;color:var(--muted2);margin-bottom:16px;line-height:1.7;">
        メールのリンクから直接各日のページが開きます。以下から手動でも選択できます。
      </div>
      ${rows}
    </div>`;
}

// ── DAY PAGE ─────────────────────────────────────────────
function renderDay(){
  const c = C[dayParam - 1];
  const pct = Math.round((dayParam / C.length) * 100);

  // Build sections HTML
  let sectionsHtml = '';
  c.sections.forEach(s => {
    let body = `<div class="ltext">${s.b.replace(/\n\n/g,'</p><p>').replace(/^/,'<p>').replace(/$/,'</p>')}</div>`;
    let pts = '';
    if(s.pts){
      pts = `<div class="pbox"><div class="pbox-label">✅ ポイント</div>${s.pts.map(p=>`<div class="pitem"><span class="pdot">▸</span><span>${p}</span></div>`).join('')}</div>`;
    }
    let analogy = '';
    if(s.analogy){
      analogy = `<div class="analogy"><div class="analogy-label">${s.analogy.label}</div><div class="analogy-text">${s.analogy.text}</div></div>`;
    }
    sectionsHtml += `<div class="lsec">
      <div class="lsec-title">${s.t}</div>
      ${body}${analogy}${pts}
    </div>`;
  });

  const sourcesHtml = c.sources.map(s=>`・${s}`).join('<br>');
  const checksHtml = c.checks.map((ch,i)=>`
    <div class="chk" id="ci${i}" onclick="toggleCheck(${i})">
      <div class="chk-circle"></div>
      <div class="chk-text">${ch}</div>
    </div>`).join('');

  const phaseColor = c.phase==='Phase 1'?'var(--acl)':c.phase==='Phase 2'?'var(--green)':'var(--amber)';

  document.getElementById('app').innerHTML = `
    <div class="hd">
      <div class="hd-ey">M&A アライアンス スキル習得プログラム</div>
      <div class="hd-badge">${c.phase} · Week ${c.week} · Day ${c.day}</div>
      <div class="hd-title">Day ${c.day}<br><span>${c.theme}</span></div>
      <div class="hd-date">${todayStr()}</div>
      <div class="hd-bar-wrap">
        <div class="hd-bar-row">
          <span class="hd-bar-label">${c.phase} 進捗</span>
          <span class="hd-bar-val">${dayParam} / 40日 (${pct}%)</span>
        </div>
        <div class="hd-bar"><div class="hd-bar-fill" style="width:${Math.max(pct,2)}%"></div></div>
      </div>
    </div>

    <div class="content">

      <div class="card goal-card">
        <div class="goal-label">🎯 今日のゴール</div>
        <div class="goal-text">${c.goal}</div>
      </div>

      <div class="sec-hd">
        <div class="sec-icon si-morning">☀️</div>
        <div class="sec-title">朝のインプット — 読むだけでOK（目安15分）</div>
      </div>

      <div class="card" style="animation-delay:.06s;">
        <div class="rbadge">📖 読み物形式 · 計算なし · 寝ながらOK</div>
        ${sectionsHtml}
        <div class="src-box">
          <div class="src-label">📚 出典・参考資料</div>
          <div class="src-item">${sourcesHtml}</div>
        </div>
      </div>

      <div class="tonight-card card">
        <div class="tonight-label">🌙 今夜やること（予告）</div>
        <div class="tonight-text">${c.tonight}</div>
      </div>

      <div class="sec-hd">
        <div class="sec-icon si-check">✅</div>
        <div class="sec-title">理解チェック（読み終わったら確認）</div>
      </div>
      <div class="card" style="animation-delay:.18s;">
        ${checksHtml}
      </div>

      <div class="sec-hd">
        <div class="sec-icon si-notion">📓</div>
        <div class="sec-title">Notionに記録する</div>
      </div>
      <a class="card notion-card" href="https://www.notion.so/M-A-Learning-Hub" target="_blank" style="animation-delay:.22s;">
        <div class="notion-logo">📝</div>
        <div class="notion-body">
          <div class="notion-label">OPEN IN NOTION</div>
          <div class="notion-title">M&A Learning Hub → Daily Log</div>
        </div>
        <div class="notion-arr">›</div>
      </a>

    </div>

    <div class="complete-wrap">
      <button class="complete-btn" onclick="completeFn()">朝のインプットを完了する</button>
    </div>`;
}

// ── CHECKLIST ────────────────────────────────────────────
function toggleCheck(i){
  document.getElementById('ci'+i)?.classList.toggle('done');
}

// ── COMPLETE ─────────────────────────────────────────────
function completeFn(){
  const c = C[dayParam - 1];
  const done = document.querySelectorAll('.chk.done').length;
  const all  = document.querySelectorAll('.chk').length;
  document.getElementById('done-msg').innerHTML =
    `<strong>Day ${c.day} — ${c.theme}</strong><br>理解チェック ${done}/${all} 完了<br><br>今夜のアウトプットも楽しみにしています 🌙`;
  document.getElementById('done-overlay').classList.add('show');
}

// ── INIT ─────────────────────────────────────────────────
if(dayParam < 1 || dayParam > C.length){
  renderHome();
} else {
  renderDay();
}
</script>
</body>
</html>
