<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>M&A学習プログラム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0b0b12;
  --s1:       #13131e;
  --s2:       #1a1a28;
  --s3:       #22223a;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.12);
  --text:     #ddddf0;
  --muted:    #6a6a88;
  --muted2:   #9898b8;
  --accent:   #7c6ff7;
  --accent-l: #a89ff8;
  --green:    #4fc88e;
  --amber:    #f4c06a;
  --coral:    #f4845f;
  --r: 10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans JP',sans-serif;
  min-height:100vh;
  padding-bottom:80px;
  font-size:14px;
  line-height:1.7;
}

/* ── HEADER ── */
.hd {
  background: linear-gradient(160deg,#16103a 0%,#0e1828 60%,#0b1820 100%);
  padding: 32px 20px 24px;
  position: relative;
  overflow: hidden;
}
.hd::after {
  content:'';
  position:absolute;
  inset:0;
  background: radial-gradient(ellipse 60% 80% at 90% 20%, rgba(124,111,247,0.18) 0%, transparent 70%);
  pointer-events:none;
}
.hd-eyebrow {
  font-family:'DM Mono',monospace;
  font-size:10px;
  letter-spacing:0.12em;
  color:var(--muted2);
  text-transform:uppercase;
  margin-bottom:10px;
}
.hd-badge {
  display:inline-block;
  background:rgba(124,111,247,0.15);
  border:1px solid rgba(124,111,247,0.3);
  color:var(--accent-l);
  font-size:10px;
  font-family:'DM Mono',monospace;
  padding:3px 10px;
  border-radius:20px;
  margin-bottom:12px;
}
.hd-title {
  font-size:24px;
  font-weight:700;
  line-height:1.25;
  margin-bottom:6px;
  position:relative;
  z-index:1;
}
.hd-title span { color:var(--accent-l); }
.hd-date {
  font-size:12px;
  color:var(--muted);
  position:relative;
  z-index:1;
}

/* ── PROGRESS STRIP ── */
.prog-strip {
  background:var(--s1);
  border-bottom:1px solid var(--border);
  padding:12px 20px;
  display:flex;
  align-items:center;
  gap:12px;
}
.prog-label { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); white-space:nowrap; }
.prog-bar { flex:1; height:3px; background:rgba(255,255,255,0.05); border-radius:2px; overflow:hidden; }
.prog-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--green)); border-radius:2px; transition:width 1.2s cubic-bezier(.4,0,.2,1); }
.prog-pct { font-family:'DM Mono',monospace; font-size:10px; color:var(--accent-l); white-space:nowrap; }

/* ── SECTIONS ── */
.sec { padding:20px; border-bottom:1px solid var(--border); }
.sec:last-child { border-bottom:none; }
.sec-label {
  font-family:'DM Mono',monospace;
  font-size:10px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:12px;
  display:flex;
  align-items:center;
  gap:8px;
}
.sec-label::after { content:''; flex:1; height:1px; background:var(--border); }

/* ── GOAL CARD ── */
.goal-card {
  background:var(--s2);
  border:1px solid rgba(124,111,247,0.25);
  border-left:3px solid var(--accent);
  border-radius:var(--r);
  padding:14px 16px;
}
.goal-text { font-size:15px; font-weight:500; line-height:1.6; }

/* ── TASK CARD ── */
.task-card {
  background:var(--s2);
  border:1px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
  margin-bottom:12px;
}
.task-card:last-of-type { margin-bottom:0; }
.task-hd {
  padding:11px 16px;
  display:flex;
  align-items:center;
  gap:10px;
  border-bottom:1px solid var(--border);
  background:var(--s3);
}
.task-icon { font-size:14px; }
.task-name { font-size:13px; font-weight:500; }
.task-dur {
  margin-left:auto;
  font-family:'DM Mono',monospace;
  font-size:10px;
  color:var(--muted);
  background:rgba(255,255,255,0.05);
  padding:3px 8px;
  border-radius:4px;
}
.task-body { padding:14px 16px; }
.task-row { display:flex; gap:10px; margin-bottom:8px; }
.task-row:last-child { margin-bottom:0; }
.task-k { font-size:11px; color:var(--muted); white-space:nowrap; padding-top:2px; min-width:40px; }
.task-v { font-size:13px; line-height:1.6; color:var(--text); }

/* ── TIMER ── */
.timer-wrap { padding:0 16px 14px; }
.timer-num {
  font-family:'DM Mono',monospace;
  font-size:32px;
  font-weight:500;
  text-align:center;
  padding:6px 0 8px;
  color:var(--accent);
  display:none;
  letter-spacing:0.05em;
}
.timer-num.on { display:block; }
.timer-num.done-c { color:var(--green); }
.timer-btn {
  width:100%;
  padding:11px;
  background:rgba(124,111,247,0.08);
  border:1px solid rgba(124,111,247,0.2);
  border-radius:8px;
  color:var(--accent-l);
  font-family:'DM Mono',monospace;
  font-size:12px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  transition:background .15s, border-color .15s, transform .1s;
}
.timer-btn:active { transform:scale(0.97); }
.timer-btn.running { background:rgba(79,200,142,0.08); border-color:rgba(79,200,142,0.25); color:var(--green); }
.timer-btn.fin { background:rgba(79,200,142,0.05); border-color:rgba(79,200,142,0.15); color:var(--green); cursor:default; }

/* ── TAGS ── */
.tags { display:flex; flex-wrap:wrap; gap:8px; }
.tag {
  background:rgba(124,111,247,0.1);
  border:1px solid rgba(124,111,247,0.18);
  color:var(--accent-l);
  font-size:11px;
  padding:5px 12px;
  border-radius:20px;
  font-family:'DM Mono',monospace;
}

/* ── CHECKLIST ── */
.check-item {
  display:flex;
  align-items:flex-start;
  gap:12px;
  padding:13px 0;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  user-select:none;
  transition:opacity .15s;
}
.check-item:last-child { border-bottom:none; padding-bottom:0; }
.check-item:active { opacity:.7; }
.check-box {
  width:22px; height:22px; flex-shrink:0;
  border:1.5px solid var(--muted);
  border-radius:6px;
  margin-top:1px;
  display:flex; align-items:center; justify-content:center;
  transition:all .2s;
  font-size:12px;
  color:transparent;
}
.check-item.done .check-box {
  background:var(--green);
  border-color:var(--green);
  color:#0b1e14;
}
.check-item.done .check-text {
  text-decoration:line-through;
  color:var(--muted);
}
.check-text { font-size:13px; line-height:1.6; }

/* ── NOTION LINK ── */
.notion-btn {
  display:flex;
  align-items:center;
  gap:14px;
  padding:14px 16px;
  background:var(--s2);
  border:1px solid var(--border2);
  border-radius:var(--r);
  text-decoration:none;
  color:var(--text);
  transition:border-color .15s, background .15s;
}
.notion-btn:active { border-color:var(--accent); background:var(--s3); }
.notion-icon {
  width:36px; height:36px; flex-shrink:0;
  background:var(--s3);
  border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-size:17px; font-weight:700;
  color:var(--text);
}
.notion-label { font-size:13px; font-weight:500; }
.notion-sub { font-size:11px; color:var(--muted); margin-top:2px; }
.notion-arr { margin-left:auto; color:var(--muted); font-size:18px; }

/* ── COMPLETE BUTTON ── */
.complete-wrap { padding:20px; }
.complete-btn {
  width:100%;
  padding:16px;
  background:linear-gradient(135deg,var(--accent) 0%,#5b54d4 100%);
  border:none;
  border-radius:12px;
  color:#fff;
  font-family:'Noto Sans JP',sans-serif;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  transition:opacity .2s, transform .1s;
  letter-spacing:0.03em;
}
.complete-btn:active { transform:scale(0.98); opacity:.9; }
.complete-btn.all-done { background:linear-gradient(135deg,var(--green) 0%,#29a36e 100%); }

/* ── DONE MODAL ── */
.modal-bg {
  display:none;
  position:fixed; inset:0;
  background:rgba(8,8,14,0.92);
  backdrop-filter:blur(4px);
  z-index:200;
  align-items:center;
  justify-content:center;
  padding:30px;
}
.modal-bg.open { display:flex; }
.modal {
  background:var(--s1);
  border:1px solid var(--border2);
  border-radius:16px;
  padding:32px 24px;
  text-align:center;
  max-width:340px;
  width:100%;
  animation: pop .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes pop { from{transform:scale(.85);opacity:0;} to{transform:scale(1);opacity:1;} }
.modal-emoji { font-size:52px; margin-bottom:16px; }
.modal-title { font-size:20px; font-weight:700; margin-bottom:8px; }
.modal-body { font-size:13px; color:var(--muted2); line-height:1.8; margin-bottom:24px; }
.modal-body strong { color:var(--green); font-weight:500; }
.modal-close {
  width:100%;
  padding:12px;
  background:var(--accent);
  border:none;
  border-radius:8px;
  color:#fff;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;
}

/* ── PHASE BADGE ── */
.phase-row {
  display:flex; gap:8px; flex-wrap:wrap; margin-top:12px;
}
.phase-chip {
  font-family:'DM Mono',monospace;
  font-size:10px;
  padding:4px 10px;
  border-radius:20px;
  border:1px solid var(--border2);
  color:var(--muted2);
}
.phase-chip.active { background:rgba(124,111,247,0.12); border-color:rgba(124,111,247,0.3); color:var(--accent-l); }

/* ── ANIMATIONS ── */
.sec { animation: fadeUp .4s ease both; }
.sec:nth-child(1){animation-delay:.05s;}
.sec:nth-child(2){animation-delay:.1s;}
.sec:nth-child(3){animation-delay:.15s;}
.sec:nth-child(4){animation-delay:.2s;}
.sec:nth-child(5){animation-delay:.25s;}
.sec:nth-child(6){animation-delay:.3s;}
@keyframes fadeUp {
  from{opacity:0;transform:translateY(12px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hd">
  <div class="hd-eyebrow">M&Aアライアンス カスタム学習プログラム</div>
  <div class="hd-badge" id="phase-badge">Phase 0 – 基礎固め</div>
  <div class="hd-title" id="hd-title">Week 1 Day 1<br><span id="hd-theme">M&A全体像</span></div>
  <div class="hd-date" id="hd-date"></div>
  <div class="phase-row">
    <span class="phase-chip active">Finance</span>
    <span class="phase-chip active">Legal</span>
    <span class="phase-chip active">Strategy</span>
    <span class="phase-chip active">PMI</span>
  </div>
</div>

<!-- PROGRESS -->
<div class="prog-strip">
  <div class="prog-label" id="prog-label">Phase 0</div>
  <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="prog-pct" id="prog-pct">1/20日</div>
</div>

<!-- GOAL -->
<div class="sec">
  <div class="sec-label">🎯 今日のゴール</div>
  <div class="goal-card">
    <div class="goal-text" id="goal-text">M&Aのプロセス全体像を説明できるようになる（5ステップ）</div>
  </div>
</div>

<!-- MORNING TASK -->
<div class="sec">
  <div class="sec-label">☀️ 朝のインプット</div>
  <div class="task-card">
    <div class="task-hd">
      <span class="task-icon">📖</span>
      <span class="task-name">読書・インプット</span>
      <span class="task-dur">15分</span>
    </div>
    <div class="task-body">
      <div class="task-row">
        <span class="task-k">タスク</span>
        <span class="task-v" id="morning-task">—</span>
      </div>
      <div class="task-row">
        <span class="task-k">注目点</span>
        <span class="task-v" id="morning-focus">—</span>
      </div>
    </div>
    <div class="timer-wrap">
      <div class="timer-num" id="m-num">15:00</div>
      <button class="timer-btn" id="m-btn" onclick="toggleTimer('m', 15)">▶ &nbsp;15分タイマー開始</button>
    </div>
  </div>
</div>

<!-- KEY CONCEPTS -->
<div class="sec">
  <div class="sec-label">💡 重要概念</div>
  <div class="tags" id="tags-wrap"></div>
</div>

<!-- EVENING CHECKLIST -->
<div class="sec">
  <div class="sec-label">🌙 夜のアウトプット</div>
  <div class="task-card" style="padding:4px 16px 0;">
    <div id="checklist"></div>
  </div>
</div>

<!-- NOTION LINK -->
<div class="sec">
  <div class="sec-label">📓 Notionで記録</div>
  <a class="notion-btn" id="notion-link" href="https://notion.so" target="_blank">
    <div class="notion-icon">N</div>
    <div>
      <div class="notion-label">日次ログを開く</div>
      <div class="notion-sub">M&A Learning Hub → Daily Log</div>
    </div>
    <div class="notion-arr">›</div>
  </a>
</div>

<!-- COMPLETE -->
<div class="complete-wrap">
  <button class="complete-btn" id="complete-btn" onclick="completeDay()">今日の学習を完了する</button>
</div>

<!-- DONE MODAL -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-emoji">🎉</div>
    <div class="modal-title" id="modal-title">お疲れさまでした！</div>
    <div class="modal-body" id="modal-body"></div>
    <button class="modal-close" onclick="closeModal()">閉じる</button>
  </div>
</div>

const TOTAL = CURRICULUM.length;

// ═══════════════════════════════════
//  DAY ROUTING
//  URLパラメータ ?d=1 でも、日付自動でも動く
// ═══════════════════════════════════
function getDayIndex() {
  const params = new URLSearchParams(location.search);
  const d = parseInt(params.get('d'));
  if (!isNaN(d) && d >= 1 && d <= TOTAL) return d - 1;

  // 開始日からの日数で自動計算
  const startStr = localStorage.getItem('ma_start');
  if (!startStr) {
    localStorage.setItem('ma_start', new Date().toISOString().split('T')[0]);
    return 0;
  }
  const start = new Date(startStr);
  const today = new Date();
  today.setHours(0,0,0,0);
  start.setHours(0,0,0,0);
  const diff = Math.floor((today - start) / 86400000);
  return Math.max(0, Math.min(diff, TOTAL - 1));
}

function updateBtn() {
  const total = document.querySelectorAll('.check-item').length;
  const done  = document.querySelectorAll('.check-item.done').length;
  const btn = document.getElementById('complete-btn');
  if (done === total) {
    btn.textContent = '今日の学習を完了する ✓';
    btn.classList.add('all-done');
  } else {
    btn.textContent = `今日の学習を完了する（${done}/${total}完了）`;
    btn.classList.remove('all-done');
  }
}

// ═══════════════════════════════════
//  TIMER
// ═══════════════════════════════════
const timers = {};
function toggleTimer(id, minutes) {
  const btn = document.getElementById(id + '-btn');
  const num = document.getElementById(id + '-num');
  const secs = minutes * 60;

  if (timers[id]) {
    clearInterval(timers[id].iv);
    delete timers[id];
    btn.className = 'timer-btn';
    btn.textContent = '▶  ' + minutes + '分タイマー開始';
    num.className = 'timer-num';
    return;
  }

  let elapsed = 0;
  num.className = 'timer-num on';
  btn.className = 'timer-btn running';
  btn.textContent = '⏹  タイマーを停止';

  function fmt(s) {
    const m2 = String(Math.floor(s/60)).padStart(2,'0');
    const s2 = String(s%60).padStart(2,'0');
    return m2 + ':' + s2;
  }
  num.textContent = fmt(secs);

  timers[id] = { iv: setInterval(() => {
    elapsed++;
    const rem = secs - elapsed;
    if (rem <= 0) {
      clearInterval(timers[id].iv);
      delete timers[id];
      num.textContent = '完了!';
      num.className = 'timer-num on done-c';
      btn.className = 'timer-btn fin';
      btn.textContent = '✓  完了';
      return;
    }
    num.textContent = fmt(rem);
  }, 1000) };
}

    '明日もメールをチェックしてください。';
  modal.classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
